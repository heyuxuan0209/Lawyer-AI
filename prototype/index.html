<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lawyer-AI 原型入口</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #152033;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(920px, calc(100vw - 32px));
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 22px;
      color: #64748b;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    a {
      display: block;
      min-height: 220px;
      padding: 22px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #dfe5ec;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    a.primary {
      border-color: #111827;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }
    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 9px;
      margin-bottom: 14px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }
    .muted {
      background: #f1f5f9;
      color: #64748b;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    ul {
      margin: 12px 0 0;
      padding-left: 18px;
      color: #475569;
      line-height: 1.8;
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Lawyer-AI 原型入口</h1>
    <p>当前主线是“实时谈案 Copilot”。如果要给律师朋友演示，请打开左侧这个新版本。</p>
    <div class="grid">
      <a class="primary" href="./live-consultation-copilot/index.html">
        <span class="tag">推荐演示</span>
        <h2>实时谈案 Copilot</h2>
        <p>劳动争议为例，模拟客户/律师分角色实时转写，右侧同步更新案情要点、追问建议、模拟法条卡和方案草稿。</p>
        <ul>
          <li>点击“开始咨询”逐段播放</li>
          <li>点击“结束咨询”生成会后产物</li>
          <li>含模拟法律意见书格式样例免责声明</li>
        </ul>
      </a>
      <a href="./labor-consultation-mvp/index.html">
        <span class="tag muted">旧版归档</span>
        <h2>咨询后整理 MVP</h2>
        <p>旧版原型，重点是咨询结束后生成纪要、结构化、材料清单、法律分析和意见书草稿。</p>
        <ul>
          <li>不含实时语音转记流</li>
          <li>不含实时法条推送</li>
          <li>保留作会后沉淀模块参考</li>
        </ul>
      </a>
    </div>
  </main>
</body>
</html>
